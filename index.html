<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiper Slider</title>
    <!-- Swiper styles were processed with PostCSS -->
    <link rel="stylesheet" href="swiper-bundle.min.css" />
    <link rel="stylesheet" href="swiper/swiper-bundle.min.css" />
    <script defer src="swiper/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <main>
      <!-- Wrapper that contains both the main slider and the thumbnails slider -->
      <div class="capybara-slider">
        <!-- Main slider (large images) -->
        <div class="capybara-slider__main swiper">
          <!-- Required wrapper for Swiper slides -->
          <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide">
              <img
                src="images/capybara1-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara1-300w.webp   300w,
                  images/capybara1-500w.webp   500w,
                  images/capybara1-800w.webp   800w,
                  images/capybara1-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara2-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara2-300w.webp   300w,
                  images/capybara2-500w.webp   500w,
                  images/capybara2-800w.webp   800w,
                  images/capybara2-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara3-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara3-300w.webp   300w,
                  images/capybara3-500w.webp   500w,
                  images/capybara3-800w.webp   800w,
                  images/capybara3-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara4-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara4-300w.webp   300w,
                  images/capybara4-500w.webp   500w,
                  images/capybara4-800w.webp   800w,
                  images/capybara4-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara1-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara1-300w.webp   300w,
                  images/capybara1-500w.webp   500w,
                  images/capybara1-800w.webp   800w,
                  images/capybara1-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara2-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara2-300w.webp   300w,
                  images/capybara2-500w.webp   500w,
                  images/capybara2-800w.webp   800w,
                  images/capybara2-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara3-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara3-300w.webp   300w,
                  images/capybara3-500w.webp   500w,
                  images/capybara3-800w.webp   800w,
                  images/capybara3-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara4-800w.webp"
                class="capybara-slider__image"
                srcset="
                  images/capybara4-300w.webp   300w,
                  images/capybara4-500w.webp   500w,
                  images/capybara4-800w.webp   800w,
                  images/capybara4-1600w.webp 1600w
                "
                sizes="(max-width: 52rem) 90vw, 50rem"
                alt=""
                loading="lazy"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Thumbnails slider -->
      <div class="capybara-slider__thumbs swiper">
        <!-- Required wrapper for Swiper slides -->
        <div class="swiper-wrapper">
          <!-- Thumbs slides -->
          <div class="capybara-slider__thumb swiper-slide">
            <img
              src="images/capybara1-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara1-thumb.webp     1x,
                images/capybara1-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara2-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara2-thumb.webp     1x,
                images/capybara2-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara3-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara3-thumb.webp     1x,
                images/capybara3-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara4-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara4-thumb.webp     1x,
                images/capybara4-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara1-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara1-thumb.webp     1x,
                images/capybara1-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara2-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara2-thumb.webp     1x,
                images/capybara2-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara3-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara3-thumb.webp     1x,
                images/capybara3-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara4-thumb.webp"
              class="capybara-slider__image"
              srcset="
                images/capybara4-thumb.webp     1x,
                images/capybara4-thumb-@2x.webp 2x
              "
              width="128"
              height="128"
              alt=""
            />
          </div>
        </div>
        <!-- Navigation buttons -->
        <div
          class="capybara-slider__thumb-button-prev swiper-button-prev"
        ></div>
        <div
          class="capybara-slider__thumb-button-next swiper-button-next"
        ></div>
      </div>
    </main>
  </body>
</html>
