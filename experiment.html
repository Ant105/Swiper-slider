<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiper Slider</title>
    <link rel="stylesheet" href="swiper/swiper-bundle.min.css" />
    <script defer src="swiper/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <main>
      <div class="capybara-slider">
        <div class="capybara-slider__main swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img
                src="images/capybara1-300w.webp"
                alt=""
                class="capybara-slider__image"
              />
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara2-300w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara3-300w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara4-300w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara1-1600w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara2-1600w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara3-1600w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
            <div class="swiper-slide">
              <img
                src="images/capybara4-1600w.webp"
                alt=""
                loading="lazy"
                class="capybara-slider__image"
              />
              <div
                class="swiper-lazy-preloader swiper-lazy-preloader-white"
              ></div>
            </div>
          </div>
        </div>
      </div>
      <div class="capybara-slider__thumbs swiper">
        <div class="swiper-wrapper">
          <div class="capybara-slider__thumb swiper-slide">
            <img
              src="images/capybara1-thumb.webp"
              alt=""
              class="capybara-slider__image"
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara2-thumb.webp"
              alt=""
              class="capybara-slider__image"
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara3-thumb.webp"
              alt=""
              class="capybara-slider__image"
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara4-thumb.webp"
              alt=""
              class="capybara-slider__image"
            />
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara1-thumb-@2x.webp"
              alt=""
              class="capybara-slider__image"
              loading="lazy"
            />
            <div
              class="swiper-lazy-preloader swiper-lazy-preloader-white"
            ></div>
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara2-thumb-@2x.webp"
              alt=""
              class="capybara-slider__image"
              loading="lazy"
            />
            <div
              class="swiper-lazy-preloader swiper-lazy-preloader-white"
            ></div>
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara3-thumb-@2x.webp"
              alt=""
              class="capybara-slider__image"
              loading="lazy"
            />
            <div
              class="swiper-lazy-preloader swiper-lazy-preloader-white"
            ></div>
            <div></div>
          </div>
          <div class="swiper-slide">
            <img
              src="images/capybara4-thumb-@2x.webp"
              alt=""
              class="capybara-slider__image"
              loading="lazy"
            />
            <div
              class="swiper-lazy-preloader swiper-lazy-preloader-white"
            ></div>
          </div>
        </div>
        <div
          class="capybara-slider__thumb-button-prev swiper-button-prev"
        ></div>
        <div
          class="capybara-slider__thumb-button-next swiper-button-next"
        ></div>
      </div>
    </main>
  </body>
</html>
